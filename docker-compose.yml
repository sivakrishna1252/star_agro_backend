services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-star_agro}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-star_agro}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - star_agro_net

  web:
    image: ${DOCKER_IMAGE:-star-agro:latest}
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${APP_PORT:-6021}:6021"
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      APP_PORT: 6021
      DEBUG: ${DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,web}
      SERVE_MEDIA: ${SERVE_MEDIA:-true}
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
    networks:
      - star_agro_net

volumes:
  postgres_data:
  media_data:
  static_data:

networks:
  star_agro_net:
    driver: bridge
